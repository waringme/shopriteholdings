<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>header harness</title>
<link rel="stylesheet" href="/styles/styles.css"/>
<link rel="stylesheet" href="/blocks/header/header.css"/>
<script type="module">
window.hlx = window.hlx || {}; window.hlx.codeBasePath = "";
const m=document.createElement("meta"); m.name="nav"; m.content="/nav-harness"; document.head.appendChild(m);
const header = document.querySelector("header");
header.classList.add("header","block"); header.dataset.blockName="header"; header.dataset.blockStatus="loaded";
const mod = await import("/blocks/header/header.js");
await mod.default(header);
document.body.classList.add("appear"); document.body.dataset.ready="1";
</script>
</head><body class="appear"><header></header><main style="height:900px"></main></body></html>
